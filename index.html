<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Artjog Opening</title>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        #ui-layer { position: absolute; top: 20px; left: 20px; color: #fff; pointer-events: none; z-index: 10; }
        .stat-box { border-left: 2px solid #fff; padding-left: 12px; margin-bottom: 10px; background: rgba(0,0,0,0.6); width: 300px;}
        .label { font-size: 9px; opacity: 0.5; text-transform: uppercase; letter-spacing: 1px; }
        .val { font-size: 11px; font-weight: bold; }
        #info-layer { position: absolute; bottom: 20px; right: 20px; color: #fff; pointer-events: none; z-index: 10; text-align: right; }
        #info-layer .stat-box { border-left: none; border-right: 2px solid #fff; padding-left: 0; padding-right: 12px; width: auto; margin-bottom: 6px; }
        .val-warn { font-size: 11px; font-weight: bold; opacity: 0.5; }
        #btn-fullscreen { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); color: #fff; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.3); font-family: 'Courier New', monospace; font-size: 9px; letter-spacing: 2px; padding: 6px 14px; cursor: pointer; z-index: 10; text-transform: uppercase; pointer-events: all; }
        #btn-fullscreen:hover { border-color: #fff; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="stat-box"><div class="label">Project</div><div class="val">Artjog Opening</div></div>
        <div class="stat-box"><div class="label">Visual Engine</div><div class="val">RAYCAST_COLLISION_V3</div></div>
        <div class="stat-box"><div class="label">Current Preset</div><div class="val" id="mode-display">PRESET_1: GEOMETRIC_X_CROSS</div></div>
    </div>

    <button id="btn-fullscreen">[ FULLSCREEN ]</button>

    <div id="info-layer">
        <div class="stat-box"><div class="label">Screen</div><div class="val-warn">10M × 5M (placeholder)</div></div>
        <div class="stat-box"><div class="label">Totem Height</div><div class="val">6M</div></div>
        <div class="stat-box"><div class="label">Moving Heads</div><div class="val">12 total — 5 totems (L:3 / R:2)</div></div>
        <div class="stat-box"><div class="label">Grid</div><div class="val">1 cell = 1M × 1M</div></div>
        <div class="stat-box"><div class="label">Scale</div><div class="val">1 unit = 1 meter</div></div>
        <div class="stat-box"><div class="label">Stage</div><div class="val">12M × 8M</div></div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module" src="simulation.js"></script>

</body>
</html>
